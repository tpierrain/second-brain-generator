# ═══════════════════════════════════════════════════════════════════════════
# CI — the net for native-dep / Node-version compatibility (ADR 0020).
#
# The only ABI-bound surface is native modules (better-sqlite3 — onnxruntime
# ships broad prebuilds). This matrix builds the engine and runs the suites
# across the supported Node window, on macOS AND Windows (parity — ADR 0015),
# so a Node/native-dep conflict goes red HERE instead of at a colleague's
# install (the Yann DANOT wall that motivated v3.0.1).
#
# The `install-e2e` job additionally runs `installer.mjs` END-TO-END on Windows —
# the path where the spawn-correctness bugs (EINVAL on npm/npx `.cmd` shims, the
# multi-line `cmd /c` rag-install) lived invisibly because no job ever executed the
# installer itself (Daniel Martin wall, 2026-06-21 — ADR 0031, plan
# windows-install-reliability). A clean exit + populated rag/node_modules is the
# assertion those bugs would have failed.
# ═══════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, node-compat]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Harness suites — pure .mjs seams (node:test), no deps to install.
      - name: Harness tests
        run: node --test "scripts/*.test.mjs" "scripts/lib/*.test.mjs"

      # Engine — `npm ci` builds the native binding (better-sqlite3) on this
      # exact Node; the test run then exercises it. This is the real net.
      - name: Install engine (builds native binding)
        working-directory: rag
        run: npm ci

      - name: Engine tests
        working-directory: rag
        run: npm test

      - name: Type-check engine
        working-directory: rag
        run: npx tsc --noEmit

  # The net for the INSTALLER path itself (Bugs 1 & 2): nothing here built a brain
  # end-to-end before, so spawn-correctness bugs on Windows stayed invisible. We run
  # the real non-interactive install on windows-latest, then assert the RAG deps
  # actually landed. Node 22 = the floor (ADR 0020); the spawn EINVAL is
  # Node-version-insensitive across the window, so one cell suffices.
  #
  # Embedder = `gemini` WITHOUT a key (not `in-process`): the bugs this job proves live
  # in the SPAWN path (prereq npm/npx `.cmd` shims, the rag-install `.cmd`, the MCP
  # smoke `npx.cmd`) — all of which run regardless of embedder, BEFORE indexing. The
  # `gemini`-no-key path defers the initial index (`embedderReady` is false) instead of
  # forcing an `in-process` ONNX weight download + CPU inference that hangs for tens of
  # minutes on the Windows runner (G2). So this still exercises the exact spawn surface
  # Bugs 1 & 2 broke, keeps the job fast + deterministic, and the populated
  # `rag/node_modules/better-sqlite3` assertion is unchanged. CI=true makes the
  # gemini-no-key path skip the editor pop + Obsidian register, so it exits 0 headless.
  # `timeout-minutes` is the belt against a future spawn-site hang regressing silently.
  install-e2e:
    name: Installer e2e · windows-latest
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22 (the supported floor)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure a git identity (the brain runs `git init` + an auto-commit hook)
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@example.com"

      - name: Run installer.mjs end-to-end (non-interactive, gemini embedder, no key → indexing deferred)
        run: node installer.mjs --non-interactive --name ci-brain --dest "${{ runner.temp }}" --owner "CI" --lang en --embedder gemini

      - name: Assert the RAG dependencies were installed (Bugs 1 & 2 would leave this empty)
        shell: pwsh
        run: |
          $dir = Join-Path "${{ runner.temp }}" "ci-brain\rag\node_modules\better-sqlite3"
          if (-not (Test-Path $dir)) { Write-Error "rag/node_modules/better-sqlite3 missing — RAG deps not installed"; exit 1 }
          Write-Host "rag/node_modules populated - install path is healthy"
